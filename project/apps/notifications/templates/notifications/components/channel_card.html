<a href="{{ href }}"
   class="group flex flex-col items-center gap-3 px-6 py-8 rounded-xl border-2 border-slate-200
          hover:border-indigo-400 hover:bg-indigo-50 active:scale-[.97] active:bg-indigo-100
          transition-all cursor-pointer no-underline">
    <span class="text-[2rem]">{{ icon }}</span>
    <div class="text-center">
        <div class="text-[1rem] font-semibold text-gray-900 group-hover:text-indigo-600 transition-colors">{{ label }}</div>
        <div class="text-[0.8rem] text-gray-500 mt-[0.2rem]">{{ description }}</div>
    </div>
</a>
